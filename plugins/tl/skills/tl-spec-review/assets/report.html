<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Technical Specification Review</title>
<!--
  Interactive review report for the Techjays TL Agent (tl-spec-review skill).
  Self-contained: no external CSS/JS/fonts — opens offline in any browser.
  The agent injects the review JSON into the #review-data script tag below
  (the placeholder token there is the only thing to replace). All rendering is
  done client-side from that single data object, so the HTML and the companion
  spec-review.md stay in sync (both derive from the same JSON).
-->
<style>
  :root {
    --bg: #f6f8fa; --surface: #ffffff; --surface-2: #f6f8fa; --border: #d0d7de;
    --text: #1f2328; --muted: #636c76; --accent: #0969da;
    --excellent: #1a7f37; --good: #2da44e; --adequate: #bf8700;
    --weak: #e16f24; --stub: #cf222e; --absent: #a40e26; --na: #8c959f;
    --blocker: #cf222e; --major: #e16f24; --minor: #bf8700; --nit: #6e7781;
    --shadow: 0 1px 3px rgba(31,35,40,.08), 0 1px 2px rgba(31,35,40,.06);
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117; --surface: #161b22; --surface-2: #21262d; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #4493f8;
      --excellent: #3fb950; --good: #56d364; --adequate: #d29922;
      --weak: #db6d28; --stub: #f85149; --absent: #ff7b72; --na: #6e7781;
      --blocker: #f85149; --major: #db6d28; --minor: #d29922; --nit: #8b949e;
      --shadow: none;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.55; font-size: 15px;
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 0 20px 80px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  h1, h2, h3 { line-height: 1.25; }
  code { background: var(--surface-2); padding: .1em .4em; border-radius: 5px; font-size: .88em;
         font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }

  /* Sticky header */
  header.topbar {
    position: sticky; top: 0; z-index: 20; background: var(--surface);
    border-bottom: 1px solid var(--border); box-shadow: var(--shadow);
  }
  .topbar-inner { max-width: 1040px; margin: 0 auto; padding: 12px 20px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .topbar .scoreball { display: flex; align-items: baseline; gap: 4px; font-weight: 800; }
  .topbar .scoreball .num { font-size: 26px; }
  .topbar .scoreball .den { font-size: 14px; color: var(--muted); font-weight: 600; }
  .topbar .title { font-size: 16px; font-weight: 700; margin: 0; flex: 1 1 240px; min-width: 0; }
  .topbar .title small { display: block; color: var(--muted); font-weight: 500; font-size: 12px; }

  .verdict-badge { padding: 6px 12px; border-radius: 999px; font-weight: 700; font-size: 13px;
    color: #fff; white-space: nowrap; }

  /* Meta chips */
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0 8px; }
  .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
    padding: 5px 12px; font-size: 13px; color: var(--muted); }
  .chip b { color: var(--text); font-weight: 600; }
  .chip.yes b { color: var(--good); } .chip.no b { color: var(--muted); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px 22px; margin: 16px 0; }
  .card h2 { margin: 0 0 12px; font-size: 18px; }
  .section-label { text-transform: uppercase; letter-spacing: .04em; font-size: 12px;
    color: var(--muted); font-weight: 700; margin: 28px 0 6px; }

  .summary-text { margin: 0 0 14px; }
  .gating { margin: 0; padding: 0; list-style: none; display: grid; gap: 8px; }
  .gating li { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px;
    background: var(--surface-2); border-radius: 8px; border-left: 3px solid var(--blocker); }
  .gating .fix { color: var(--muted); }

  /* Scorecard */
  table.scorecard { width: 100%; border-collapse: collapse; }
  table.scorecard td, table.scorecard th { padding: 9px 8px; text-align: left;
    border-bottom: 1px solid var(--border); vertical-align: middle; }
  table.scorecard th { font-size: 12px; text-transform: uppercase; letter-spacing: .03em;
    color: var(--muted); }
  table.scorecard tr.area-row { cursor: pointer; }
  table.scorecard tr.area-row:hover { background: var(--surface-2); }
  .grp-row td { background: var(--surface-2); font-weight: 700; font-size: 12px;
    text-transform: uppercase; letter-spacing: .04em; color: var(--muted); padding: 6px 8px; }
  .areacode { color: var(--muted); font-size: 12px; font-family: ui-monospace, monospace; }
  .bar { position: relative; height: 8px; border-radius: 4px; background: var(--surface-2);
    overflow: hidden; min-width: 90px; }
  .bar > span { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 4px; }
  .scorenum { font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .statuslbl { font-size: 12px; font-weight: 700; }
  tr.total-row td { border-top: 2px solid var(--border); border-bottom: none;
    font-weight: 800; font-size: 16px; padding-top: 14px; }

  /* Area detail accordion */
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0 0; }
  .btn { background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 7px; padding: 6px 12px; font-size: 13px; cursor: pointer; font-weight: 600; }
  .btn:hover { background: var(--surface-2); }
  details.area { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin: 10px 0; overflow: hidden; box-shadow: var(--shadow); }
  details.area > summary { list-style: none; cursor: pointer; padding: 14px 18px;
    display: flex; align-items: center; gap: 12px; }
  details.area > summary::-webkit-details-marker { display: none; }
  details.area > summary::after { content: "▸"; margin-left: auto; color: var(--muted);
    transition: transform .15s; }
  details.area[open] > summary::after { transform: rotate(90deg); }
  details.area > summary .swatch { width: 6px; height: 30px; border-radius: 3px; flex: none; }
  details.area > summary .aname { font-weight: 700; }
  details.area > summary .ascore { margin-left: 6px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .area-body { padding: 4px 18px 18px 36px; border-top: 1px solid var(--border); }
  .area-body h4 { margin: 14px 0 4px; font-size: 12px; text-transform: uppercase;
    letter-spacing: .03em; color: var(--muted); }
  .fnd-chiprow { display: flex; flex-wrap: wrap; gap: 6px; }
  .fnd-chip { font-family: ui-monospace, monospace; font-size: 12px; padding: 3px 8px;
    border-radius: 6px; background: var(--surface-2); border: 1px solid var(--border);
    cursor: pointer; font-weight: 600; }
  .fnd-chip:hover { border-color: var(--accent); }

  /* Findings register */
  .sevfilter { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 14px; }
  .sevbtn { border: 1px solid var(--border); background: var(--surface); cursor: pointer;
    border-radius: 999px; padding: 5px 13px; font-size: 13px; font-weight: 700; color: var(--text); }
  .sevbtn[aria-pressed="true"] { background: var(--text); color: var(--bg); border-color: var(--text); }
  .sevbtn .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px;
    vertical-align: middle; }
  table.findings { width: 100%; border-collapse: collapse; }
  table.findings th, table.findings td { padding: 10px 8px; text-align: left;
    border-bottom: 1px solid var(--border); vertical-align: top; }
  table.findings th { font-size: 12px; text-transform: uppercase; color: var(--muted); }
  table.findings tr[hidden] { display: none; }
  .sevtag { display: inline-block; padding: 2px 9px; border-radius: 999px; color: #fff;
    font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap; }
  .fid { font-family: ui-monospace, monospace; font-weight: 700; white-space: nowrap; }
  .fid:target, tr.flash > td { animation: flash 1.6s ease; }
  @keyframes flash { 0%,40% { background: rgba(255,196,0,.28); } 100% { background: transparent; } }
  .areatag { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); }

  ol.actions, ul.qs { padding-left: 20px; margin: 6px 0; } ol.actions li, ul.qs li { margin: 6px 0; }
  .strength-list { margin: 6px 0; padding-left: 20px; } .strength-list li { margin: 4px 0; }
  footer { color: var(--muted); font-size: 12px; text-align: center; margin-top: 30px; }
  .empty { color: var(--muted); font-style: italic; }

  @media print {
    header.topbar { position: static; box-shadow: none; }
    details.area { break-inside: avoid; } details.area[open] > summary::after { content: ""; }
    .toolbar, .sevfilter { display: none; } .card { break-inside: avoid; box-shadow: none; }
  }
  @media (max-width: 640px) {
    table.scorecard .col-bar { display: none; }
    .area-body { padding-left: 18px; }
  }
</style>
</head>
<body>
<script id="review-data" type="application/json">__REVIEW_DATA__</script>

<header class="topbar">
  <div class="topbar-inner">
    <div class="scoreball"><span class="num" id="tb-score">–</span><span class="den">/10</span></div>
    <h1 class="title" id="tb-title">Technical Specification Review<small id="tb-sub"></small></h1>
    <span class="verdict-badge" id="tb-verdict">—</span>
  </div>
</header>

<div class="wrap" id="root">
  <div class="meta" id="meta"></div>

  <div class="card" id="exec">
    <h2>Executive summary</h2>
    <p class="summary-text" id="exec-summary"></p>
    <div id="gating-wrap"></div>
    <div id="strengths-wrap"></div>
  </div>

  <div class="section-label">Scorecard</div>
  <div class="card"><table class="scorecard"><thead><tr>
    <th>#</th><th>Area</th><th class="col-bar">Score</th><th>/10</th><th>Status</th>
  </tr></thead><tbody id="scorecard-body"></tbody></table></div>

  <div class="section-label">Area detail</div>
  <div class="toolbar">
    <button class="btn" id="expandAll">Expand all</button>
    <button class="btn" id="collapseAll">Collapse all</button>
  </div>
  <div id="areas"></div>

  <div class="section-label">Findings register</div>
  <div class="sevfilter" id="sevfilter"></div>
  <div class="card"><table class="findings"><thead><tr>
    <th>ID</th><th>Sev.</th><th>Area</th><th>Finding</th><th>Suggested fix</th>
  </tr></thead><tbody id="findings-body"></tbody></table></div>

  <div class="section-label">Clarifying questions for the author</div>
  <div class="card"><ul class="qs" id="questions"></ul></div>

  <div class="section-label">Recommended next actions</div>
  <div class="card"><ol class="actions" id="actions"></ol></div>

  <footer id="footer"></footer>
</div>

<script>
(function () {
  "use strict";
  var SEV = {
    Blocker: { c: "var(--blocker)" }, Major: { c: "var(--major)" },
    Minor: { c: "var(--minor)" }, Nit: { c: "var(--nit)" }
  };
  var SEV_ORDER = ["Blocker", "Major", "Minor", "Nit"];

  function el(tag, attrs, kids) {
    var n = document.createElement(tag);
    if (attrs) for (var k in attrs) {
      if (k === "class") n.className = attrs[k];
      else if (k === "html") n.innerHTML = attrs[k];
      else if (k === "text") n.textContent = attrs[k];
      else n.setAttribute(k, attrs[k]);
    }
    (kids || []).forEach(function (c) { if (c) n.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
    return n;
  }
  function scoreColor(s) {
    if (s === "N/A" || s == null) return "var(--na)";
    s = +s;
    if (s >= 9) return "var(--excellent)"; if (s >= 7) return "var(--good)";
    if (s >= 5) return "var(--adequate)"; if (s >= 3) return "var(--weak)";
    if (s >= 1) return "var(--stub)"; return "var(--absent)";
  }
  function verdictColor(v) {
    v = (v || "").toLowerCase();
    if (v.indexOf("ready to build") === 0) return "var(--excellent)";
    if (v.indexOf("caveat") >= 0) return "var(--adequate)";
    if (v.indexOf("not ready") >= 0 || v.indexOf("major rework") >= 0) return "var(--absent)";
    return "var(--weak)"; // "significant gaps"
  }

  var data;
  try { data = JSON.parse(document.getElementById("review-data").textContent); }
  catch (e) {
    document.getElementById("root").innerHTML =
      '<div class="card"><h2>No review data</h2><p class="empty">This template has not been populated yet. ' +
      'The TL agent injects the review JSON into the <code>#review-data</code> block.</p></div>';
    return;
  }

  // ---- Header ----
  document.getElementById("tb-score").textContent = (data.overallScore != null ? data.overallScore : "–");
  document.getElementById("tb-score").style.color = scoreColor(Math.round(data.overallScore));
  document.getElementById("tb-title").firstChild.textContent = (data.project || "Technical Specification") + " — Review";
  document.getElementById("tb-sub").textContent = data.documentVersion ? ("v" + data.documentVersion) : "";
  var vb = document.getElementById("tb-verdict");
  vb.textContent = data.verdict || ""; vb.style.background = verdictColor(data.verdict);

  // ---- Meta chips ----
  var sys = data.system || {};
  var meta = document.getElementById("meta");
  function chip(label, val, cls) { return el("span", { class: "chip " + (cls || "") },
    [document.createTextNode(label + " "), el("b", { text: val })]); }
  if (data.documentReviewed) meta.appendChild(chip("Document:", data.documentReviewed));
  meta.appendChild(chip("Reviewed:", data.reviewDate || "—"));
  meta.appendChild(chip("AI / LLM system?", sys.isAI ? "Yes" : "No", sys.isAI ? "yes" : "no"));
  meta.appendChild(chip("Multiple systems?", sys.multiSystem ? "Yes" : "No", sys.multiSystem ? "yes" : "no"));

  // ---- Executive summary ----
  document.getElementById("exec-summary").textContent = data.executiveSummary || "";
  var findingById = {}; (data.findings || []).forEach(function (f) { findingById[f.id] = f; });
  var gating = (data.gatingFindings || []).map(function (id) { return findingById[id]; }).filter(Boolean);
  if (gating.length) {
    var gw = document.getElementById("gating-wrap");
    gw.appendChild(el("h4", { class: "section-label", text: "Gating findings", style: "margin-top:6px" }));
    var ul = el("ul", { class: "gating" });
    gating.forEach(function (f) {
      ul.appendChild(el("li", { style: "border-left-color:" + SEV[f.severity].c }, [
        el("a", { href: "#" + f.id, class: "fid", text: f.id }),
        el("span", {}, [el("span", { class: "sevtag", style: "background:" + SEV[f.severity].c, text: f.severity }),
          document.createTextNode(" " + f.finding + " "),
          el("span", { class: "fix", text: "→ " + f.fix })])
      ]));
    });
    gw.appendChild(ul);
  }
  if (data.strengths && data.strengths.length) {
    var sw = document.getElementById("strengths-wrap");
    sw.appendChild(el("h4", { class: "section-label", text: "Notable strengths", style: "margin-top:14px" }));
    var sl = el("ul", { class: "strength-list" });
    data.strengths.forEach(function (s) { sl.appendChild(el("li", { text: s })); });
    sw.appendChild(sl);
  }

  // ---- Scorecard ----
  var body = document.getElementById("scorecard-body");
  var lastGroup = null;
  (data.areas || []).forEach(function (a) {
    if (a.group && a.group !== lastGroup) {
      lastGroup = a.group;
      var gr = el("tr", { class: "grp-row" }); gr.appendChild(el("td", { colspan: "5", text: a.group }));
      body.appendChild(gr);
    }
    var isNA = (a.score === "N/A" || a.score == null);
    var col = scoreColor(a.score);
    var bar = el("div", { class: "bar" });
    if (!isNA) bar.appendChild(el("span", { style: "width:" + (a.score * 10) + "%;background:" + col }));
    var tr = el("tr", { class: "area-row", "data-area": a.code });
    tr.appendChild(el("td", { class: "areacode", text: a.num }));
    tr.appendChild(el("td", {}, [el("span", { text: a.name }), document.createTextNode("  "),
      el("span", { class: "areacode", text: a.code })]));
    tr.appendChild(el("td", { class: "col-bar" }, [bar]));
    tr.appendChild(el("td", { class: "scorenum", style: "color:" + col, text: isNA ? "N/A" : a.score }));
    tr.appendChild(el("td", {}, [el("span", { class: "statuslbl", style: "color:" + col, text: a.band || "" })]));
    tr.addEventListener("click", function () {
      var d = document.getElementById("area-" + a.code);
      if (d) { d.open = true; d.scrollIntoView({ behavior: "smooth", block: "start" }); }
    });
    body.appendChild(tr);
  });
  var totColor = scoreColor(Math.round(data.overallScore));
  var totr = el("tr", { class: "total-row" });
  totr.appendChild(el("td", { colspan: "3", text: "Overall (avg of applicable)" }));
  totr.appendChild(el("td", { class: "scorenum", style: "color:" + totColor, text: data.overallScore }));
  totr.appendChild(el("td", {}, [el("span", { class: "statuslbl", style: "color:" + totColor, text: data.verdict || "" })]));
  body.appendChild(totr);

  // ---- Area detail ----
  var areasWrap = document.getElementById("areas");
  (data.areas || []).forEach(function (a) {
    var isNA = (a.score === "N/A" || a.score == null);
    var col = scoreColor(a.score);
    var d = el("details", { class: "area", id: "area-" + a.code });
    if (!isNA && +a.score < 5) d.open = true; // surface the weak areas by default
    var sum = el("summary", {}, [
      el("span", { class: "swatch", style: "background:" + col }),
      el("span", { class: "aname", text: a.num + ". " + a.name }),
      el("span", { class: "areacode", text: a.code }),
      el("span", { class: "ascore", style: "color:" + col, text: isNA ? "N/A" : (a.score + "/10") })
    ]);
    var b = el("div", { class: "area-body" });
    b.appendChild(el("h4", { text: "Assessment" }));
    b.appendChild(el("p", { text: a.assessment || "—" }));
    b.appendChild(el("h4", { text: "Findings" }));
    if (a.findingIds && a.findingIds.length) {
      var cr = el("div", { class: "fnd-chiprow" });
      a.findingIds.forEach(function (id) {
        var f = findingById[id];
        var chip = el("span", { class: "fnd-chip", title: f ? (f.severity + ": " + f.finding) : "",
          style: f ? ("border-left:3px solid " + SEV[f.severity].c) : "", text: id });
        chip.addEventListener("click", function () { jumpTo(id); });
        cr.appendChild(chip);
      });
      b.appendChild(cr);
    } else { b.appendChild(el("p", { class: "empty", text: "None — covered well." })); }
    if (a.suggestions) { b.appendChild(el("h4", { text: "Suggestions" })); b.appendChild(el("p", { text: a.suggestions })); }
    if (a.strengths) { b.appendChild(el("h4", { text: "Strengths" })); b.appendChild(el("p", { text: a.strengths })); }
    d.appendChild(sum); d.appendChild(b); areasWrap.appendChild(d);
  });
  document.getElementById("expandAll").addEventListener("click", function () {
    document.querySelectorAll("details.area").forEach(function (d) { d.open = true; }); });
  document.getElementById("collapseAll").addEventListener("click", function () {
    document.querySelectorAll("details.area").forEach(function (d) { d.open = false; }); });

  // ---- Findings register + severity filter ----
  var counts = { Blocker: 0, Major: 0, Minor: 0, Nit: 0 };
  (data.findings || []).forEach(function (f) { if (counts[f.severity] != null) counts[f.severity]++; });
  var fbody = document.getElementById("findings-body");
  var sorted = (data.findings || []).slice().sort(function (x, y) {
    return SEV_ORDER.indexOf(x.severity) - SEV_ORDER.indexOf(y.severity) || x.id.localeCompare(y.id);
  });
  if (!sorted.length) { fbody.appendChild(el("tr", {}, [el("td", { colspan: "5", class: "empty", text: "No findings logged." })])); }
  sorted.forEach(function (f) {
    var tr = el("tr", { id: f.id, "data-sev": f.severity });
    tr.appendChild(el("td", {}, [el("span", { class: "fid", text: f.id })]));
    tr.appendChild(el("td", {}, [el("span", { class: "sevtag", style: "background:" + SEV[f.severity].c, text: f.severity })]));
    tr.appendChild(el("td", {}, [el("span", { class: "areatag", text: f.area || "" })]));
    tr.appendChild(el("td", { text: f.finding || "" }));
    tr.appendChild(el("td", { text: f.fix || "" }));
    fbody.appendChild(tr);
  });

  var active = "All";
  var sf = document.getElementById("sevfilter");
  function mkSev(label, count, color) {
    var b = el("button", { class: "sevbtn", "aria-pressed": label === "All" ? "true" : "false" });
    if (color) b.appendChild(el("span", { class: "dot", style: "background:" + color }));
    b.appendChild(document.createTextNode(label + (count != null ? " (" + count + ")" : "")));
    b.addEventListener("click", function () {
      active = label;
      sf.querySelectorAll(".sevbtn").forEach(function (x) { x.setAttribute("aria-pressed", "false"); });
      b.setAttribute("aria-pressed", "true");
      fbody.querySelectorAll("tr").forEach(function (tr) {
        if (!tr.getAttribute("data-sev")) return;
        tr.hidden = (label !== "All" && tr.getAttribute("data-sev") !== label);
      });
    });
    return b;
  }
  sf.appendChild(mkSev("All", (data.findings || []).length, null));
  SEV_ORDER.forEach(function (s) { sf.appendChild(mkSev(s, counts[s], SEV[s].c)); });

  function jumpTo(id) {
    if (active !== "All") sf.querySelector(".sevbtn").click();
    var row = document.getElementById(id);
    if (row) { row.hidden = false; row.scrollIntoView({ behavior: "smooth", block: "center" });
      row.classList.add("flash"); setTimeout(function () { row.classList.remove("flash"); }, 1700); }
  }

  // ---- Questions / actions / footer ----
  var q = document.getElementById("questions");
  (data.questions || []).forEach(function (t) { q.appendChild(el("li", { text: t })); });
  if (!(data.questions || []).length) q.appendChild(el("li", { class: "empty", text: "None raised." }));
  var ac = document.getElementById("actions");
  (data.nextActions || []).forEach(function (t) { ac.appendChild(el("li", { text: t })); });
  document.getElementById("footer").textContent =
